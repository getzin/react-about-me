<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Old School Events</title>
</head>
<body>

    <h1>Old School HTML Events</h1>

    <button onclick="sayHello()">
        Klick mich
    </button>

    <script>
        function sayHello() {
            console.log("Hallo aus klassischem HTML!");
        }
    </script>

</body>
</html>
